name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_npm:
        description: "Skip npm publish"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast lint + type check (no Rust, no native build needed)
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - name: Cache Turbo artifacts
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: bun install --frozen-lockfile
      - name: Type check changed packages
        if: github.event_name == 'pull_request'
        run: bun run ci:check:affected
      - name: Type check full workspace
        if: github.event_name != 'pull_request'
        run: bun run ci:check:full

  native:
    strategy:
      fail-fast: false
      matrix:
        include: ${{ startsWith(github.ref, 'refs/tags/v') && fromJSON('[
          {"os":"ubuntu-22.04","platform":"linux","arch":"x64","variants":"baseline","rust_checks":true},
          {"os":"ubuntu-22.04","platform":"linux","arch":"x64","variants":"modern"},
          {"os":"ubuntu-22.04","platform":"linux","arch":"arm64","target":"aarch64-unknown-linux-gnu"},
          {"os":"macos-15-intel","platform":"darwin","arch":"x64","variants":"baseline"},
          {"os":"macos-15-intel","platform":"darwin","arch":"x64","variants":"modern"},
          {"os":"macos-14","platform":"darwin","arch":"arm64"},
          {"os":"windows-latest","platform":"win32","arch":"x64","variants":"baseline"},
          {"os":"windows-latest","platform":"win32","arch":"x64","variants":"modern"}
          ]') || fromJSON('[
          {"os":"ubuntu-22.04","platform":"linux","arch":"x64","variants":"baseline","rust_checks":true},
          {"os":"ubuntu-22.04","platform":"linux","arch":"x64","variants":"modern"}
          ]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@nightly # TODO: unpin once nightly codegen regression is fixed
        with:
          toolchain: nightly-2026-03-27
          components: ${{ matrix.rust_checks && 'clippy, rustfmt' || '' }}
          targets: ${{ matrix.target }}
      - name: Ensure cross-compilation target is installed
        if: matrix.target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}${{ matrix.variants }}
          cache-workspace-crates: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: bun install --frozen-lockfile
      - name: Install cross-compilation toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Rust checks
        if: matrix.rust_checks
        run: bun run check:rs
      - name: Build native addon(s)
        env:
          CROSS_TARGET: ${{ matrix.target }}
          TARGET_PLATFORM: ${{ matrix.platform }}
          TARGET_ARCH: ${{ matrix.arch }}
          TARGET_VARIANTS: ${{ matrix.variants }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        shell: bash
        run: |
          bun run ci:build:native
      - name: Upload native addon(s)
        uses: actions/upload-artifact@v4
        with:
          name: pi-natives-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.variants && format('-{0}', matrix.variants) || '' }}
          path: packages/natives/native/pi_natives.${{ matrix.platform }}-${{ matrix.arch }}*.node
          if-no-files-found: error

  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - uses: dtolnay/rust-toolchain@nightly # TODO: unpin once nightly codegen regression is fixed
        with:
          toolchain: nightly-2026-03-27
      - uses: Swatinem/rust-cache@v2
        with:
          cache-workspace-crates: true
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - name: Cache Turbo artifacts
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep imagemagick
          sudo ln -s $(which fdfind) /usr/local/bin/fd
          sudo ln -sf /usr/bin/convert /usr/local/bin/magick
      - run: bun install --frozen-lockfile
      - run: bun run build:native
      - name: Test changed packages
        if: github.event_name == 'pull_request'
        run: bun run ci:test:affected
      - name: Test full workspace
        if: github.event_name != 'pull_request'
        run: bun run ci:test:full
      - name: CLI smoke test
        run: bun run ci:test:smoke

  install_methods:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - uses: dtolnay/rust-toolchain@nightly # TODO: unpin once nightly codegen regression is fixed
        with:
          toolchain: nightly-2026-03-27
      - uses: Swatinem/rust-cache@v2
        with:
          cache-workspace-crates: true
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep imagemagick
          sudo ln -s $(which fdfind) /usr/local/bin/fd
          sudo ln -sf /usr/bin/convert /usr/local/bin/magick
      - run: bun install --frozen-lockfile
      - name: Install method smoke tests
        run: bun run ci:test:install-methods

  auto-release:
    if: github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore:')
    needs: [check, native, test, install_methods]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - run: bun install --frozen-lockfile
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Auto-detect version and release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: bun scripts/release.ts auto

  # Build Linux + Windows binaries on Ubuntu
  build-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, native, test, install_methods]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          lfs: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - run: bun install --frozen-lockfile
      - name: Download native addons
        uses: actions/download-artifact@v4
        with:
          pattern: pi-natives-*
          path: packages/natives/native
          merge-multiple: true
      - name: Verify native addons
        run: bun run ci:release:verify-natives
      - name: Build Linux and Windows binaries
        run: bun scripts/ci-release-build-binaries.ts --platform linux,win32
      - name: Stage native addons for release
        run: cp packages/natives/native/*.node packages/coding-agent/binaries/
      - name: Upload release binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-linux-win
          path: packages/coding-agent/binaries/*
          if-no-files-found: error

  # Build macOS binaries natively, then sign and notarize
  build-sign-macos:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, native, test, install_methods]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          lfs: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - run: bun install --frozen-lockfile
      - name: Download macOS native addons
        uses: actions/download-artifact@v4
        with:
          pattern: pi-natives-darwin-*
          path: packages/natives/native
          merge-multiple: true
      - name: Build macOS binaries
        run: bun scripts/ci-release-build-binaries.ts --platform darwin
      - name: Stage macOS native addons for release
        run: cp packages/natives/native/*.node packages/coding-agent/binaries/

      - name: Import Code Signing Certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12

          openssl pkcs12 -info -in $RUNNER_TEMP/certificate.p12 -noout -passin pass:"$APPLE_CERTIFICATE_PASSWORD" || {
            echo "ERROR: Invalid p12 file or wrong password"
            exit 1
          }

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $RUNNER_TEMP/certificate.p12 \
            -k $KEYCHAIN_PATH \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          rm $RUNNER_TEMP/certificate.p12

      - name: Sign macOS Binaries
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "ERROR: No Developer ID signing identity found"
            exit 1
          fi
          echo "Using signing identity: $SIGNING_IDENTITY"

          for ARCH in x64 arm64; do
            BINARY_PATH="packages/coding-agent/binaries/xcsh-darwin-${ARCH}"
            if [ -f "$BINARY_PATH" ]; then
              codesign --force --options runtime \
                --entitlements scripts/entitlements.plist \
                --sign "$SIGNING_IDENTITY" \
                --timestamp "$BINARY_PATH"

              codesign --verify --verbose "$BINARY_PATH" || {
                echo "::error::Code signature verification failed for $ARCH"
                exit 1
              }

              AUTHORITY=$(codesign -dvvv "$BINARY_PATH" 2>&1 | grep "Authority=Developer ID Application" || true)
              if [ -z "$AUTHORITY" ]; then
                echo "::error::Binary not signed with Developer ID Application certificate for $ARCH"
                exit 1
              fi
              echo "  Signed with: $AUTHORITY"

              FLAGS=$(codesign -dvvv "$BINARY_PATH" 2>&1 | grep "flags=" || true)
              if echo "$FLAGS" | grep -q "runtime"; then
                echo "  Hardened runtime enabled"
              else
                echo "::error::Hardened runtime not enabled for $ARCH"
                exit 1
              fi

              echo "$ARCH signed successfully"
            else
              echo "WARNING: Binary not found: $BINARY_PATH (skipping)"
            fi
          done

      - name: Notarize macOS Binaries
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for ARCH in x64 arm64; do
            BINARY_PATH="packages/coding-agent/binaries/xcsh-darwin-${ARCH}"
            ZIP_PATH="$RUNNER_TEMP/xcsh-darwin-${ARCH}.zip"

            if [ -f "$BINARY_PATH" ]; then
              ditto -c -k --keepParent "$BINARY_PATH" "$ZIP_PATH"

              NOTARY_OUTPUT=$(xcrun notarytool submit "$ZIP_PATH" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                --wait 2>&1)
              echo "$NOTARY_OUTPUT"

              if echo "$NOTARY_OUTPUT" | grep -q "status: Accepted"; then
                echo "  Notarization accepted for $ARCH"
              else
                echo "::error::Notarization failed for $ARCH"
                exit 1
              fi

              STAPLE_OUTPUT=$(xcrun stapler staple "$BINARY_PATH" 2>&1) || true
              if echo "$STAPLE_OUTPUT" | grep -q "The staple and validate action worked"; then
                echo "  Notarization ticket stapled"
              else
                echo "  Stapling not supported for bare Mach-O CLI tools (expected)"
              fi

              echo "All checks passed for $ARCH"
            else
              echo "WARNING: Binary not found: $BINARY_PATH (skipping)"
            fi
          done

      - name: Upload signed macOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-macos-signed
          path: packages/coding-agent/binaries/*
          if-no-files-found: error

  # Collect all artifacts and create the GitHub Release
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-release, build-sign-macos]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
      - name: Download Linux/Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: release-binaries-linux-win
          path: packages/coding-agent/binaries
      - name: Download signed macOS binaries
        uses: actions/download-artifact@v4
        with:
          name: release-binaries-macos-signed
          path: packages/coding-agent/binaries
      - name: List release binaries
        run: ls -la packages/coding-agent/binaries/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          files: packages/coding-agent/binaries/*
          generate_release_notes: true

  # Package Homebrew archives from signed binaries and update the tap
  update-homebrew:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [create-release]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - run: bun install --frozen-lockfile
      - name: Download signed macOS binaries
        uses: actions/download-artifact@v4
        with:
          name: release-binaries-macos-signed
          path: packages/coding-agent/binaries
      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: release-binaries-linux-win
          path: packages/coding-agent/binaries
      - name: Package archives for Homebrew
        run: bun scripts/ci-release-homebrew.ts --package-only
      - name: Upload Homebrew archives to release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          for archive in packages/coding-agent/binaries/*.zip packages/coding-agent/binaries/*.tar.gz; do
            if [ -f "$archive" ]; then
              echo "Uploading $(basename "$archive") to release $TAG..."
              gh release upload "$TAG" "$archive" --clobber
            fi
          done
      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: bun scripts/ci-release-homebrew.ts --update-tap

  # Publish to npm
  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v') && !inputs.skip_npm
    needs: [create-release]
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          lfs: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - run: bun install --frozen-lockfile
      - name: Publish to npm
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run ci:release:publish
